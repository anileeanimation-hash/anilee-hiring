name: Keep Alive — Ping Streamlit App

on:
  schedule:
    # Runs every 25 minutes, 24x7 (GitHub Actions cron uses UTC)
    - cron: "0,25,50 * * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Anilee Hiring Portal
        run: |
          echo "Pinging site at $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            "https://anilee-hiring-hr.streamlit.app")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Site is awake and responding."
          else
            echo "⚠️ Site returned status $STATUS — may still be waking up."
          fi
